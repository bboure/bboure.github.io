<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Benoit Bouré — Developer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1c1917;
    }

    .card {
      text-align: center;
      padding: 3rem 2.5rem;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1.25rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    .tagline {
      font-size: 1rem;
      color: #78716c;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.8; }

    .btn-primary {
      background: #1c1917;
      color: #fff;
    }

    .btn-secondary {
      background: transparent;
      color: #1c1917;
      border: 1.5px solid #d6d3d1;
    }

    svg { width: 18px; height: 18px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="card">
    <img
      class="avatar"
      src="https://github.com/bboure.png"
      alt="Benoit Bouré"
    />
    <h1>Benoit Bouré</h1>
    <p class="tagline">Developer</p>

    <div class="links">
      <a class="btn btn-primary" href="https://benoitboure.com" target="_blank" rel="noopener">

</html>
